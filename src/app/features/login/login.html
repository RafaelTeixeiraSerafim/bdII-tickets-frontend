<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-100 to-blue-100 p-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">
    <div class="flex flex-col items-center mb-6">
      <div class="w-14 h-14 rounded-full bg-blue-600 flex items-center justify-center mb-3">
        <span class="material-icons text-white" style="font-size: 30px">support_agent</span>
      </div>
      <h1 class="text-2xl font-semibold text-slate-800">Tickets Dashboard</h1>
      <p class="text-sm text-slate-500">Faça login para continuar</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-4">
      <div>
        <label class="label required">E-mail</label>
        <div class="relative">
          <input class="input pr-10" type="email" formControlName="email" autocomplete="username" />
          <span class="material-icons mi-20 absolute right-3 top-1/2 -translate-y-1/2 text-slate-400">mail</span>
        </div>
        @if (form.controls.email.touched && form.controls.email.invalid) {
          <p class="field-error">Informe um e-mail válido.</p>
        }
      </div>

      <div>
        <label class="label required">Senha</label>
        <div class="relative">
          <input
            class="input pr-10"
            [type]="hidePassword() ? 'password' : 'text'"
            formControlName="senha"
            autocomplete="current-password"
          />
          <button
            type="button"
            class="absolute right-2 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600"
            (click)="hidePassword.set(!hidePassword())"
          >
            <span class="material-icons mi-20">
              {{ hidePassword() ? 'visibility_off' : 'visibility' }}
            </span>
          </button>
        </div>
        @if (form.controls.senha.touched && form.controls.senha.invalid) {
          <p class="field-error">Senha é obrigatória.</p>
        }
      </div>

      @if (error()) {
        <div class="rounded-md bg-rose-50 text-rose-700 text-sm px-3 py-2">{{ error() }}</div>
      }

      <button type="submit" class="btn btn-primary w-full !h-11" [disabled]="loading()">
        @if (loading()) {
          <span class="spinner"></span>
        } @else {
          Entrar
        }
      </button>
    </form>
  </div>
</div>
