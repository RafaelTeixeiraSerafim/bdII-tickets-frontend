<div class="flex h-screen overflow-hidden">
  <!-- Sidebar -->
  <aside
    class="bg-white border-r border-slate-200 flex-shrink-0 transition-all duration-200 overflow-hidden"
    [class.w-64]="sidebarOpen()"
    [class.w-0]="!sidebarOpen()"
  >
    <div class="w-64 h-full flex flex-col">
      <div class="flex items-center gap-2 px-5 h-16 border-b border-slate-200">
        <span class="material-icons text-blue-600">support_agent</span>
        <span class="text-lg font-semibold text-slate-800">Tickets</span>
      </div>

      <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
        @for (item of nav(); track item.path) {
          <a
            [routerLink]="item.path"
            routerLinkActive="bg-blue-50 text-blue-700"
            class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 hover:bg-slate-100 transition-colors"
          >
            <span class="material-icons mi-20">{{ item.icon }}</span>
            <span class="text-sm font-medium">{{ item.label }}</span>
          </a>
        }
      </nav>
    </div>
  </aside>

  <!-- Main area -->
  <div class="flex-1 flex flex-col min-w-0">
    <header class="bg-white border-b border-slate-200 h-16 flex items-center px-4 gap-2 flex-shrink-0">
      <button class="btn-icon" (click)="toggleSidebar()" title="Alternar menu">
        <span class="material-icons">menu</span>
      </button>
      <div class="flex-1"></div>

      <!-- User menu -->
      <div class="relative">
        <button
          class="flex items-center gap-2 px-2 py-1.5 rounded-lg hover:bg-slate-100 transition-colors"
          (click)="menuOpen.set(!menuOpen())"
        >
          <span class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-blue-100 text-blue-700 text-sm font-semibold">
            {{ initials() }}
          </span>
          <span class="text-slate-700 text-sm hidden sm:inline">{{ user()?.nome }}</span>
          <span class="material-icons mi-20 text-slate-400">arrow_drop_down</span>
        </button>

        @if (menuOpen()) {
          <!-- click-away backdrop -->
          <div class="fixed inset-0 z-10" (click)="menuOpen.set(false)"></div>
          <div class="absolute right-0 mt-1 w-56 bg-white rounded-lg shadow-lg border border-slate-200 z-20 overflow-hidden">
            <div class="px-4 py-3 border-b border-slate-100">
              <p class="text-sm font-medium text-slate-800">{{ user()?.nome }}</p>
              <p class="text-xs text-slate-500">{{ user()?.email }}</p>
              <p class="text-xs text-slate-400 mt-1 uppercase">{{ user()?.role }}</p>
            </div>
            <button
              class="w-full flex items-center gap-2 px-4 py-2.5 text-sm text-slate-700 hover:bg-slate-50"
              (click)="menuOpen.set(false); logout()"
            >
              <span class="material-icons mi-20">logout</span> Sair
            </button>
          </div>
        }
      </div>
    </header>

    <main class="flex-1 overflow-y-auto bg-slate-50">
      <div class="p-6 max-w-7xl mx-auto">
        <router-outlet />
      </div>
    </main>
  </div>
</div>

<app-toast-host />
